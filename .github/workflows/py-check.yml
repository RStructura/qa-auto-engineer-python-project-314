name: Python CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: make install

      - name: Start application in Docker
        run: make start

      - name: Wait for application
        run: |
          for _ in {1..30}; do
            if curl -fsS "$APP_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          exit 1

      - name: Run linter and tests
        run: make check

      - name: Generate coverage report
        run: make test-coverage

      - name: Stop application
        if: always()
        run: make stop

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=RStructura_qa-auto-engineer-python-project-314
            -Dsonar.organization=rstructura
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=tests/pages,tests/utils
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/test_*.py
